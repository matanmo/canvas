<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Mobile-first viewport meta - prevents browser zoom -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <!-- Prevent iOS text selection and input actions -->
    <meta name="format-detection" content="telephone=no, date=no, email=no, address=no">
    <title>Canvas</title>
    
    <!-- iOS Web App Configuration - Makes it work like a native app when added to home screen -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Canvas">
    <link rel="apple-touch-icon" href="favicon.png">
    <link rel="icon" href="favicon.png">
    
    <!-- Material Icons font -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20,400,0,0" rel="stylesheet">
    <!-- Load app CSS here (not via async loader) so .splash-screen.hidden applies before first paint — no splash flash -->
    <link rel="stylesheet" href="style.css?b=16">
</head>
<body>
    <!-- Splash screen overlay -->
    <div id="splashScreen" class="splash-screen hidden">
        <div class="splash-content">
            <h1>Meet Canvas</h1>
            <p>Canvas is the <b>fastest way to draw</b> when pen and paper aren’t around. Just open it and start drawing.</p>
            <div class="splash-instructions">
                <div class="instruction-item">
                    <span class="instruction-icon">✏️</span>
                    <span class="instruction-text">Simply <b>draw</b>.</span>
                </div>
                <div class="instruction-item">
                    <span class="instruction-icon">🤏</span>
                    <span class="instruction-text">Pinch to <b>zoom</b> in and out.</span>
                </div>
                <div class="instruction-item">
                    <span class="instruction-icon">✌️</span>
                    <span class="instruction-text"><b>Pan</b> using two fingers.</span>
                </div>
                <div class="instruction-item">
                    <span class="instruction-icon">👨‍🎨</span>
                    <span class="instruction-text"><b>Share</b> or <b>save</b> with a tap.</span>
                </div>
            </div>
            <button id="gotItBtn" class="got-it-btn">Start drawing</button>
        </div>
    </div>

    <!-- Drawing + text overlay (text is always above strokes) -->
    <div class="canvas-stack">
        <canvas id="drawingCanvas"></canvas>
        <div id="textLayer" class="text-layer" aria-hidden="true"></div>
    </div>

    <!-- Shown when a text label is selected: size, align, delete -->
    <div id="textEditPanel" class="text-edit-panel hidden" aria-hidden="true">
        <button type="button" id="textSizeDecreaseBtn" class="text-edit-panel__icon-btn" aria-label="Decrease text size">
            <span class="material-symbols-rounded text-edit-panel__icon">text_decrease</span>
        </button>
        <button type="button" id="textSizeIncreaseBtn" class="text-edit-panel__icon-btn" aria-label="Increase text size">
            <span class="material-symbols-rounded text-edit-panel__icon">text_increase</span>
        </button>
        <button type="button" id="textAlignBtn" class="text-edit-panel__icon-btn" aria-label="Align text center">
            <span class="material-symbols-rounded text-edit-panel__align-icon">format_align_center</span>
        </button>
        <span class="text-edit-panel__divider" aria-hidden="true">⋮</span>
        <button type="button" id="textDeleteBtn" class="text-edit-panel__icon-btn text-edit-panel__btn--danger" aria-label="Remove text">
            <span class="material-symbols-rounded text-edit-panel__icon">delete</span>
        </button>
    </div>
    
    <!-- Brush/eraser toggle -->
    <div class="tool-selector">
        <div class="tool-selector-row">
            <div class="tool-toggle eraser-disabled">
                <button id="brushBtn" class="tool-option active" data-tool="brush">
                    <span class="material-symbols-rounded">stylus</span>
                </button>
                <button id="eraserBtn" class="tool-option" data-tool="eraser" disabled>
                    <span class="material-symbols-rounded">ink_eraser</span>
                </button>
                <div class="toggle-handle"></div>
            </div>
        </div>
    </div>
    
    <!-- Minimal bottom toolbar -->
    <div class="toolbar">
        <button type="button" id="clearBtn" class="toolbar-btn toolbar-btn--disabled" aria-disabled="true" tabindex="-1">delete</button>
        <div class="undo-redo-container">
            <!-- Not native disabled so taps still fire (haptics + shake when nothing to undo/redo) -->
            <button type="button" id="undoBtn" class="toolbar-btn toolbar-btn--disabled" aria-disabled="true" tabindex="-1">undo</button>
            <button type="button" id="redoBtn" class="toolbar-btn toolbar-btn--disabled" aria-disabled="true" tabindex="-1">redo</button>
        </div>
        <button type="button" id="shareBtn" class="toolbar-btn toolbar-btn--disabled" aria-disabled="true" tabindex="-1">ios_share</button>
    </div>
    
    <!-- Fresh app.js URL from version.json so home-screen apps get JS updates; CSS is synchronous in <head> above -->
    <script>
    (function () {
        function loadAppJs(build) {
            var s = document.createElement('script');
            s.src = 'app.js?b=' + encodeURIComponent(build);
            document.body.appendChild(s);
        }
        fetch('version.json', { cache: 'no-store', credentials: 'same-origin' })
            .then(function (r) { return r.ok ? r.json() : Promise.reject(); })
            .then(function (v) { loadAppJs(v.build); })
            .catch(function () { loadAppJs(String(Date.now())); });
    })();
    </script>
</body>
</html>
